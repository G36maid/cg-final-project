<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>OGL — Rubik's Cube</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <canvas id="glcanvas"></canvas>

    <!-- Top bar: timer + moves -->
    <div id="top-bar">
        <div id="timer">0:00.00</div>
        <div id="moves-display"><span id="moves-count">0</span> moves</div>
    </div>

    <!-- Control buttons -->
    <div id="controls">
        <button id="btn-scramble">SCRAMBLE</button>
        <button id="btn-solve">SOLVE</button>
        <button id="btn-undo" disabled>UNDO</button>
        <button id="btn-redo" disabled>REDO</button>
    </div>

    <!-- Scramble formula -->
    <div id="scramble-bar" class="formula-bar">
        <div class="formula-label">Scramble</div>
        <div id="scramble-formula" class="formula-text"></div>
    </div>

    <!-- Solution formula -->
    <div id="solution-bar" class="formula-bar" style="display:none">
        <div class="formula-label">Solution</div>
        <div id="solution-formula" class="formula-text"></div>
    </div>

    <!-- 2D Cube net -->
    <canvas id="net-canvas" width="192" height="144"></canvas>

    <!-- Help hint -->
    <div id="hint">Drag cube faces to rotate layers · Drag empty space to orbit · Press S to scramble</div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
