<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>OGL — Rubik's Cube</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <canvas id="glcanvas"></canvas>

    <!-- Top bar: timer + moves -->
    <div id="top-bar">
        <div id="timer">0:00.00</div>
        <div id="moves-display"><span id="moves-count">0</span> moves</div>
    </div>

    <!-- Control buttons -->
    <div id="controls">
        <button type="button" id="btn-scramble">SCRAMBLE</button>
        <button type="button" id="btn-solve">SOLVE</button>
        <button type="button" id="btn-undo" disabled>UNDO</button>
        <button type="button" id="btn-redo" disabled>REDO</button>
    </div>

    <!-- Scramble formula -->
    <div id="scramble-bar" class="formula-bar">
        <div class="formula-label">Scramble</div>
        <div id="scramble-formula" class="formula-text"></div>
    </div>

    <!-- Solution formula -->
    <div id="solution-bar" class="formula-bar" style="display:none">
        <div class="formula-label">Solution</div>
        <div id="solution-formula" class="formula-text"></div>
    </div>

    <!-- 2D Cube net -->
    <canvas id="net-canvas" width="192" height="144"></canvas>

    <!-- Help hint -->
    <div id="hint">Drag cube faces to rotate layers · Drag empty space to orbit · Press S to scramble</div>

    <script>
    (() => {
        const params = new URLSearchParams(location.search);
        if (params.get('from') !== 'hub') return;
        const btn = document.createElement('button');
        btn.id = 'back-to-hub';
        btn.textContent = '↩ 返回樂園';
        Object.assign(btn.style, {
            position: 'fixed', top: '16px', right: '16px',
            padding: '8px 16px', background: 'rgba(20,15,35,0.85)',
            border: '1px solid rgba(255,180,120,0.5)', borderRadius: '6px',
            color: '#ffb878', fontSize: '14px', cursor: 'pointer', zIndex: '1000',
            fontFamily: 'sans-serif'
        });
        btn.addEventListener('click', () => { location.href = '../Theme-Park/index.html'; });
        document.body.appendChild(btn);
        window.addEventListener('dusk-park-solved', () => {
            const payout = 30;
            try {
                const raw = localStorage.getItem('dusk-park-state');
                const state = raw ? JSON.parse(raw) : { tokens: 0, coasterRides: 0, gamesPlayed: { pinball: 0, rubiks: 0, tetris: 0 }, achievements: [] };
                state.tokens += payout;
                state.gamesPlayed.rubiks = (state.gamesPlayed.rubiks || 0) + 1;
                localStorage.setItem('dusk-park-state', JSON.stringify(state));
            } catch(_) {}
            const info = document.createElement('div');
            Object.assign(info.style, {
                position: 'fixed', bottom: '60px', left: '50%', transform: 'translateX(-50%)',
                padding: '12px 24px', background: 'rgba(20,15,35,0.9)', borderRadius: '8px',
                border: '1px solid rgba(255,180,120,0.5)', color: '#ffb878', fontSize: '18px',
                fontWeight: '700', zIndex: '1001', fontFamily: 'sans-serif', textAlign: 'center'
            });
            info.textContent = `+ ${payout} Tokens`;
            document.body.appendChild(info);
            setTimeout(() => { info.remove(); }, 3000);
        });
    })();
    </script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
