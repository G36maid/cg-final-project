<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tetris</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="hud">
        <div id="info-left">
            <div class="hud-panel">
                <div class="hud-label">SCORE</div>
                <div id="score" class="hud-value">0</div>
            </div>
            <div class="hud-panel">
                <div class="hud-label">LEVEL</div>
                <div id="level" class="hud-value">1</div>
            </div>
            <div class="hud-panel">
                <div class="hud-label">LINES</div>
                <div id="lines" class="hud-value">0</div>
            </div>
        </div>
        <div id="info-right">
            <div class="hud-panel">
                <div class="hud-label">NEXT</div>
                <div id="next" class="hud-pieces"></div>
            </div>
            <div class="hud-panel">
                <div class="hud-label">HOLD</div>
                <div id="hold" class="hud-pieces"></div>
            </div>
        </div>
    </div>
    <div id="controls-hint">
        ←→ Move X · ↑↓ Move Z · Q/E Rot Y · W/S Rot X · A/D Rot Z · Space Hard Drop · Shift Soft Drop · C Hold · P Pause · R Restart
    </div>
    <div id="overlay">
        <div id="overlay-text">PAUSED</div>
    </div>
    <script>
    (function() {
        var params = new URLSearchParams(location.search);
        if (params.get('from') !== 'hub') return;
        var btn = document.createElement('button');
        btn.textContent = '↩ 返回樂園';
        Object.assign(btn.style, {
            position: 'fixed', top: '16px', right: '16px',
            padding: '8px 16px', background: 'rgba(20,15,35,0.85)',
            border: '1px solid rgba(255,180,120,0.5)', borderRadius: '6px',
            color: '#ffb878', fontSize: '14px', cursor: 'pointer', zIndex: '1000',
            fontFamily: 'sans-serif'
        });
        btn.addEventListener('click', function() { location.href = '../Theme-Park/index.html'; });
        document.body.appendChild(btn);
        window.addEventListener('dusk-park-gameover', function(e) {
            var lines = e.detail.lines || 0;
            var payout = lines * 3;
            try {
                var raw = localStorage.getItem('dusk-park-state');
                var state = raw ? JSON.parse(raw) : { tokens: 0, coasterRides: 0, gamesPlayed: { pinball: 0, rubiks: 0, tetris: 0 }, achievements: [] };
                state.tokens += payout;
                state.gamesPlayed.tetris = (state.gamesPlayed.tetris || 0) + 1;
                localStorage.setItem('dusk-park-state', JSON.stringify(state));
            } catch(_) {}
            var info = document.createElement('div');
            Object.assign(info.style, {
                position: 'fixed', bottom: '60px', left: '50%', transform: 'translateX(-50%)',
                padding: '12px 24px', background: 'rgba(20,15,35,0.9)', borderRadius: '8px',
                border: '1px solid rgba(255,180,120,0.5)', color: '#ffb878', fontSize: '18px',
                fontWeight: '700', zIndex: '1001', fontFamily: 'sans-serif', textAlign: 'center'
            });
            info.textContent = '+ ' + payout + ' Tokens';
            document.body.appendChild(info);
            setTimeout(function() { info.remove(); }, 3000);
        });
    })();
    </script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
