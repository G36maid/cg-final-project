<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>3D Pinball — Neon Arcade</title>
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <!-- ── HUD Overlay ─────────────────────────────────────────────── -->
    <div id="hud">
        <!-- Score -->
        <div id="hud-score-label">SCORE</div>
        <div id="hud-score">0</div>

        <!-- Ball Icons -->
        <div id="hud-balls"></div>

        <!-- Multiplier -->
        <div id="hud-multiplier">1.0x</div>

        <!-- Floating Messages -->
        <div id="hud-messages"></div>

        <!-- Ball Save Timer -->
        <div id="hud-ballsave"></div>

        <!-- Plunger Power Bar -->
        <div id="hud-plunger">
            <div id="hud-plunger-bar"></div>
        </div>

        <!-- ── Title Screen ──────────────────────────────────────────── -->
        <div id="hud-title">
            <h1>NEON PINBALL</h1>
            <h2>3D ARCADE</h2>
            <div class="controls">
                <span>Z</span> — Left Flipper &nbsp;·&nbsp;
                <span>M</span> — Right Flipper<br>
                <span>SPACE</span> — Hold to Charge Plunger / Release to Launch
            </div>
            <button id="hud-start">INSERT COIN</button>
        </div>

        <!-- ── Game Over Screen ─────────────────────────────────────── -->
        <div id="hud-gameover">
            <h1>GAME OVER</h1>
            <p>FINAL SCORE</p>
            <div id="hud-gameover-score">0</div>
            <button id="hud-restart">PLAY AGAIN</button>
        </div>
    </div>

    <!-- ── Dusk Park Integration ─────────────────────────────────────── -->
    <script>
    (function() {
        var params = new URLSearchParams(location.search);
        if (params.get('from') !== 'hub') return;
        var btn = document.createElement('button');
        btn.textContent = '↩ 返回樂園';
        Object.assign(btn.style, {
            position: 'fixed', top: '16px', right: '16px',
            padding: '8px 16px', background: 'rgba(20,15,35,0.85)',
            border: '1px solid rgba(255,180,120,0.5)', borderRadius: '6px',
            color: '#ffb878', fontSize: '14px', cursor: 'pointer', zIndex: '1000',
            fontFamily: 'sans-serif'
        });
        btn.addEventListener('click', function() { location.href = '../Theme-Park/index.html'; });
        document.body.appendChild(btn);
        window.addEventListener('dusk-park-gameover', function(e) {
            var score = e.detail.score || 0;
            var payout = Math.floor(score * 0.01);
            try {
                var raw = localStorage.getItem('dusk-park-state');
                var state = raw ? JSON.parse(raw) : { tokens: 0, coasterRides: 0, gamesPlayed: { pinball: 0, rubiks: 0, tetris: 0 }, achievements: [] };
                state.tokens += payout;
                state.gamesPlayed.pinball = (state.gamesPlayed.pinball || 0) + 1;
                localStorage.setItem('dusk-park-state', JSON.stringify(state));
            } catch(_) {}
            var info = document.createElement('div');
            Object.assign(info.style, {
                position: 'fixed', bottom: '60px', left: '50%', transform: 'translateX(-50%)',
                padding: '12px 24px', background: 'rgba(20,15,35,0.9)', borderRadius: '8px',
                border: '1px solid rgba(255,180,120,0.5)', color: '#ffb878', fontSize: '18px',
                fontWeight: '700', zIndex: '1001', fontFamily: 'sans-serif', textAlign: 'center'
            });
            info.textContent = '+ ' + payout + ' Tokens';
            document.body.appendChild(info);
            setTimeout(function() { info.remove(); }, 3000);
        });
    })();
    </script>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
